databases:
  - name: smart-pass-db
    databaseName: smart_bus_pass
    user: smart_pass_user
    plan: free

services:
  # ── Backend (Spring Boot) ──────────────────────────────────────────
  - type: web
    name: smart-pass-backend
    runtime: java
    rootDir: backend
    buildCommand: mvn -B clean package -DskipTests
    startCommand: java -jar target/smart-bus-pass-api-1.0.0.jar
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: smart-pass-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: smart-pass-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: smart-pass-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # set manually after frontend URL is known

  # ── Frontend (React/Vite static site) ─────────────────────────────
  - type: web
    name: smart-pass-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        sync: false   # set manually to: https://smart-pass-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
