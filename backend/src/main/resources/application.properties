spring.application.name=smart-bus-pass-api
server.port=${PORT:8080}

# PostgreSQL (use env vars in production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smart_bus_pass}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true

# SQL seed data
spring.sql.init.mode=always

# JWT
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-please}
jwt.expiration=86400000

# Pass price
app.pass-price-per-month=500

# CORS (comma-separated list of allowed frontend origins)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
